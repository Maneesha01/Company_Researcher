research_task:
  description: >
    Research about the {company} company online and collect the important and relevant information about company in concise manner along with the source links the information is collected on. 
  expected_output: >
    Report containing detailed analysis about {company} 
  agent: Researcher_Agent
  

analysis_task:
  description: > 
    Analyze the research findings and create a comprehensive report on {company}.
  expected_output: >
    Report summarizing findings of research task about {company}
  agent : Analyst_Agent
  context: 
    - research_task
  output_file: >
    output/final_report.md


  



